services:
  db:
    image: pgvector/pgvector:pg16
    container_name: setflow-db
    environment:
      POSTGRES_USER: setflow
      POSTGRES_PASSWORD: setflow
      POSTGRES_DB: setflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
